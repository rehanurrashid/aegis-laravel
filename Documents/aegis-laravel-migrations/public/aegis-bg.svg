<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1080" viewBox="0 0 900 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0f0c08"/>
      <stop offset="45%" stop-color="#1a140d"/>
      <stop offset="100%" stop-color="#221a10"/>
    </linearGradient>
    <radialGradient id="ggt" cx="65%" cy="12%" r="45%">
      <stop offset="0%" stop-color="#a0813e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a0813e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ggb" cx="20%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#c4a96a" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#c4a96a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wm" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#3d2e18" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0f0c08" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.35"/>
      <stop offset="30%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="75%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="vh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.2"/>
      <stop offset="20%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="80%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#c4a96a" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#c4a96a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c4a96a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lg2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d4be90" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#d4be90" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4be90" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lg3" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#c4a96a" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#c4a96a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4a96a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="900" height="1080" fill="url(#bg)"/>
  <rect width="900" height="1080" fill="url(#wm)"/>

  <!-- Fine grid -->
  <g opacity="0.045" stroke="#c4a96a" stroke-width="0.5">
    <line x1="0" y1="90"   x2="900" y2="90"/>
    <line x1="0" y1="180"  x2="900" y2="180"/>
    <line x1="0" y1="270"  x2="900" y2="270"/>
    <line x1="0" y1="360"  x2="900" y2="360"/>
    <line x1="0" y1="450"  x2="900" y2="450"/>
    <line x1="0" y1="540"  x2="900" y2="540"/>
    <line x1="0" y1="630"  x2="900" y2="630"/>
    <line x1="0" y1="720"  x2="900" y2="720"/>
    <line x1="0" y1="810"  x2="900" y2="810"/>
    <line x1="0" y1="900"  x2="900" y2="900"/>
    <line x1="0" y1="990"  x2="900" y2="990"/>
    <line x1="90"  y1="0" x2="90"  y2="1080"/>
    <line x1="180" y1="0" x2="180" y2="1080"/>
    <line x1="270" y1="0" x2="270" y2="1080"/>
    <line x1="360" y1="0" x2="360" y2="1080"/>
    <line x1="450" y1="0" x2="450" y2="1080"/>
    <line x1="540" y1="0" x2="540" y2="1080"/>
    <line x1="630" y1="0" x2="630" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/>
    <line x1="810" y1="0" x2="810" y2="1080"/>
  </g>

  <!-- Diagonal composition lines -->
  <line x1="900" y1="0"   x2="0"   y2="820"  stroke="url(#lg1)" stroke-width="0.8"/>
  <line x1="900" y1="60"  x2="60"  y2="900"  stroke="url(#lg1)" stroke-width="0.5"/>
  <line x1="840" y1="0"   x2="0"   y2="700"  stroke="url(#lg3)" stroke-width="0.4"/>
  <line x1="0"   y1="100" x2="760" y2="1080" stroke="url(#lg2)" stroke-width="0.6"/>
  <line x1="100" y1="0"   x2="900" y2="1000" stroke="url(#lg2)" stroke-width="0.4"/>

  <!-- Hexagon rings -->
  <polygon points="450,40 760,215 760,565 450,740 140,565 140,215"
    fill="none" stroke="#c4a96a" stroke-width="0.7" opacity="0.12"/>
  <polygon points="450,90 720,245 720,530 450,680 180,530 180,245"
    fill="none" stroke="#c4a96a" stroke-width="0.5" opacity="0.09"/>
  <polygon points="450,150 680,280 680,490 450,620 220,490 220,280"
    fill="none" stroke="#c4a96a" stroke-width="0.5" opacity="0.07"/>

  <!-- Gold glow orbs -->
  <rect width="900" height="1080" fill="url(#ggt)"/>
  <rect width="900" height="1080" fill="url(#ggb)"/>

  <!-- Radiating lines from top-centre -->
  <g opacity="0.06" stroke="#d4be90" stroke-width="0.6">
    <line x1="450" y1="0" x2="0"   y2="1080"/>
    <line x1="450" y1="0" x2="90"  y2="1080"/>
    <line x1="450" y1="0" x2="180" y2="1080"/>
    <line x1="450" y1="0" x2="270" y2="1080"/>
    <line x1="450" y1="0" x2="360" y2="1080"/>
    <line x1="450" y1="0" x2="450" y2="1080"/>
    <line x1="450" y1="0" x2="540" y2="1080"/>
    <line x1="450" y1="0" x2="630" y2="1080"/>
    <line x1="450" y1="0" x2="720" y2="1080"/>
    <line x1="450" y1="0" x2="810" y2="1080"/>
    <line x1="450" y1="0" x2="900" y2="1080"/>
  </g>

  <!-- Medical cross motif -->
  <g opacity="0.055" stroke="#c4a96a" stroke-width="0.6">
    <line x1="680" y1="80"  x2="680" y2="340"/>
    <line x1="560" y1="210" x2="800" y2="210"/>
  </g>
  <circle cx="680" cy="210" r="3"   fill="#c4a96a" opacity="0.1"/>
  <circle cx="680" cy="210" r="1.5" fill="#c4a96a" opacity="0.18"/>

  <!-- Constellation dots & connectors -->
  <g fill="#d4be90">
    <circle cx="720" cy="95"  r="1"   opacity="0.45"/>
    <circle cx="745" cy="78"  r="1.5" opacity="0.55"/>
    <circle cx="768" cy="112" r="1"   opacity="0.35"/>
    <circle cx="788" cy="88"  r="0.8" opacity="0.4"/>
    <circle cx="810" cy="65"  r="1.2" opacity="0.5"/>
    <circle cx="830" cy="98"  r="0.8" opacity="0.3"/>
    <circle cx="758" cy="58"  r="0.7" opacity="0.3"/>
    <line x1="745" y1="78"  x2="810" y2="65"  stroke="#d4be90" stroke-width="0.4" opacity="0.2"/>
    <line x1="810" y1="65"  x2="830" y2="98"  stroke="#d4be90" stroke-width="0.4" opacity="0.2"/>
    <line x1="745" y1="78"  x2="768" y2="112" stroke="#d4be90" stroke-width="0.4" opacity="0.15"/>
    <circle cx="85"  cy="380" r="1.2" opacity="0.4"/>
    <circle cx="110" cy="355" r="0.8" opacity="0.35"/>
    <circle cx="130" cy="395" r="1.5" opacity="0.5"/>
    <circle cx="105" cy="415" r="0.7" opacity="0.3"/>
    <circle cx="55"  cy="405" r="1"   opacity="0.35"/>
    <line x1="85"  y1="380" x2="130" y2="395" stroke="#d4be90" stroke-width="0.4" opacity="0.18"/>
    <line x1="130" y1="395" x2="105" y2="415" stroke="#d4be90" stroke-width="0.4" opacity="0.15"/>
    <circle cx="400" cy="870" r="1"   opacity="0.4"/>
    <circle cx="425" cy="888" r="1.5" opacity="0.45"/>
    <circle cx="455" cy="858" r="0.8" opacity="0.35"/>
    <circle cx="480" cy="878" r="1.2" opacity="0.5"/>
    <circle cx="445" cy="905" r="0.7" opacity="0.3"/>
    <line x1="425" y1="888" x2="480" y2="878" stroke="#d4be90" stroke-width="0.4" opacity="0.2"/>
    <line x1="455" y1="858" x2="425" y2="888" stroke="#d4be90" stroke-width="0.4" opacity="0.15"/>
    <circle cx="200" cy="150" r="0.8" opacity="0.3"/>
    <circle cx="310" cy="95"  r="1"   opacity="0.35"/>
    <circle cx="580" cy="780" r="1.2" opacity="0.4"/>
    <circle cx="650" cy="920" r="0.8" opacity="0.3"/>
    <circle cx="820" cy="700" r="1"   opacity="0.35"/>
    <circle cx="70"  cy="680" r="0.8" opacity="0.3"/>
    <circle cx="150" cy="950" r="1"   opacity="0.35"/>
    <circle cx="860" cy="420" r="0.8" opacity="0.3"/>
  </g>

  <!-- Aegis shield outline -->
  <path d="M450 120 L640 200 L640 460 Q640 590 450 680 Q260 590 260 460 L260 200 Z"
    fill="none" stroke="#c4a96a" stroke-width="1" opacity="0.1"/>
  <line x1="450" y1="120" x2="450" y2="680" stroke="#c4a96a" stroke-width="0.5" opacity="0.07"/>
  <line x1="280" y1="320" x2="620" y2="320" stroke="#c4a96a" stroke-width="0.5" opacity="0.07"/>
  <polygon points="450,270 490,320 450,370 410,320"
    fill="none" stroke="#c4a96a" stroke-width="0.7" opacity="0.14"/>

  <!-- Scan lines texture — lower third -->
  <g opacity="0.032" stroke="#c4a96a" stroke-width="0.5">
    <line x1="0" y1="750" x2="900" y2="750"/>
    <line x1="0" y1="760" x2="900" y2="760"/>
    <line x1="0" y1="770" x2="900" y2="770"/>
    <line x1="0" y1="780" x2="900" y2="780"/>
    <line x1="0" y1="790" x2="900" y2="790"/>
    <line x1="0" y1="800" x2="900" y2="800"/>
    <line x1="0" y1="812" x2="900" y2="812"/>
    <line x1="0" y1="824" x2="900" y2="824"/>
    <line x1="0" y1="836" x2="900" y2="836"/>
    <line x1="0" y1="848" x2="900" y2="848"/>
    <line x1="0" y1="860" x2="900" y2="860"/>
    <line x1="0" y1="874" x2="900" y2="874"/>
    <line x1="0" y1="888" x2="900" y2="888"/>
    <line x1="0" y1="902" x2="900" y2="902"/>
    <line x1="0" y1="916" x2="900" y2="916"/>
    <line x1="0" y1="930" x2="900" y2="930"/>
    <line x1="0" y1="946" x2="900" y2="946"/>
    <line x1="0" y1="962" x2="900" y2="962"/>
    <line x1="0" y1="978" x2="900" y2="978"/>
    <line x1="0" y1="994" x2="900" y2="994"/>
  </g>

  <!-- Corner ornaments -->
  <g stroke="#c4a96a" stroke-width="1" fill="none">
    <path d="M30 70 L30 30 L70 30"    opacity="0.3"/>
    <circle cx="30" cy="30"   r="2.5" fill="#c4a96a" opacity="0.5"/>
    <path d="M870 70 L870 30 L830 30" opacity="0.3"/>
    <circle cx="870" cy="30"  r="2.5" fill="#c4a96a" opacity="0.5"/>
    <path d="M30 1010 L30 1050 L70 1050"    opacity="0.3"/>
    <circle cx="30"  cy="1050" r="2.5" fill="#c4a96a" opacity="0.5"/>
    <path d="M870 1010 L870 1050 L830 1050" opacity="0.3"/>
    <circle cx="870" cy="1050" r="2.5" fill="#c4a96a" opacity="0.5"/>
  </g>

  <!-- Depth rings -->
  <circle cx="450" cy="390" r="260" fill="none" stroke="#c4a96a" stroke-width="0.5" opacity="0.06"/>
  <circle cx="450" cy="390" r="200" fill="none" stroke="#c4a96a" stroke-width="0.4" opacity="0.05"/>
  <circle cx="450" cy="390" r="140" fill="none" stroke="#c4a96a" stroke-width="0.4" opacity="0.055"/>
  <circle cx="720" cy="780" r="180" fill="none" stroke="#c4a96a" stroke-width="0.4" opacity="0.05"/>
  <circle cx="140" cy="200" r="130" fill="none" stroke="#c4a96a" stroke-width="0.4" opacity="0.045"/>

  <!-- ECG / heartbeat line -->
  <path d="M0 940 L120 940 L150 940 L165 910 L180 970 L195 895 L210 985 L225 940 L400 940 L900 940"
    fill="none" stroke="#c4a96a" stroke-width="0.8" opacity="0.12"/>

  <!-- Final vignettes -->
  <rect width="900" height="1080" fill="url(#vv)"/>
  <rect width="900" height="1080" fill="url(#vh)"/>
</svg>
